name: Deploy PWA to Pages (Actions)

# 레거시 Pages 빌더 고장 대체 — gh-pages 브랜치의 산출물을 최신 Actions 파이프라인으로 게시.
# radonc-app 의 deploy-pwa 가 gh-pages push 후 repository_dispatch(pwa-updated) 로 트리거.
on:
  workflow_dispatch:
  repository_dispatch:
    types: [pwa-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout gh-pages (built PWA)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
